name: Generate

on:
  push:
    branches:
      - main
    paths:
      - "data/tools.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate README catalog
        run: python scripts/generate_readme.py

      - name: Export marketing site YAML
        run: python scripts/export_marketing_yaml.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md generated/developer_tools.yml
          git diff --staged --quiet || git commit -m "chore: regenerate README and marketing YAML from tools.yml [skip ci]"
          git push

      - name: Checkout marketing-site
        uses: actions/checkout@v4
        with:
          repository: lunch-money/marketing-site
          token: ${{ secrets.MARKETING_SITE_PAT }}
          path: marketing-site

      - name: Copy generated file
        run: cp generated/developer_tools.yml marketing-site/_data/developer_tools.yml

      - name: Open or update PR against marketing-site
        working-directory: marketing-site
        env:
          GH_TOKEN: ${{ secrets.MARKETING_SITE_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sync/developer-tools-$(date +%Y%m%d)"

          # If a branch for today already exists, reuse it; otherwise create it.
          git fetch origin
          if git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git add _data/developer_tools.yml

          if git diff --staged --quiet; then
            echo "No changes to developer_tools.yml — skipping PR."
            exit 0
          fi

          git commit -m "chore: update developer tools catalog from awesome-lunchmoney"
          git push origin "$BRANCH"

          # Open a PR only if one doesn't already exist for this branch.
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --repo lunch-money/marketing-site \
              --head "$BRANCH" \
              --base master \
              --title "Update developer tools catalog" \
              --body $'Automated sync from [awesome-lunchmoney](https://github.com/lunch-money/awesome-lunchmoney).\n\nThis PR updates `_data/developer_tools.yml` from the latest generated export.\n\n**Do not edit this file manually** — changes should be made in `awesome-lunchmoney/data/tools.yml`.'
          else
            echo "PR #$EXISTING already exists for branch $BRANCH — updated with new commit."
          fi
