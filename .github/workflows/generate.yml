name: Generate

on:
  push:
    branches:
      - main
    paths:
      - "data/tools.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate README catalog
        run: python scripts/generate_readme.py

      - name: Export marketing site YAML
        run: python scripts/export_marketing_yaml.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md generated/developer_tools.yml
          git diff --staged --quiet || git commit -m "chore: regenerate README and marketing YAML from tools.yml [skip ci]"
          git push
