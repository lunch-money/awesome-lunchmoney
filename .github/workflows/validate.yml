name: Validate

on:
  pull_request:
    paths:
      - "data/tools.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Validate data/tools.yml
        run: python scripts/validate_tools.py
