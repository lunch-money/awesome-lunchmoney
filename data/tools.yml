#
# Canonical source for the Awesome Lunch Money developer ecosystem catalog.
#
# This file drives two generated outputs:
#   - The catalog section of README.md (all entries included)
#   - generated/developer_tools.yml (for the marketing site)
#
# To add or update a tool, edit this file and open a pull request.
# See contributing.md for guidelines and the full field reference.
#
# Tool fields:
#   name        (required) — Display name
#   description (required) — Short description
#   author      (optional) — Creator name
#   lang        (optional) — Language/platform tag (js, python, go, ruby, dart, kotlin, rust, ios, android, chrome, web, cli, pwa)
#   lang_label  (optional) — Override the displayed label for the lang tag (e.g. "TypeScript")
#   github      (optional) — GitHub URL
#   url         (optional) — Live demo, website, or app store URL
#   url_label   (optional) — Label for the url link (default: "Website")
#   official    (optional) — Set to true for official Lunch Money projects
#   spotlight   (optional) — Blog post URL for a community spotlight featuring this tool
#   discord     (optional) — Discord channel URL for this tool's discussion thread
#   links       (optional) — Additional links as list of {url, label} objects
#
# Control fields:
#   marketing_site.include  (optional) — Set to false to exclude from marketing site (default: true)
#   readme.include          (optional) — Set to false to exclude from README (default: true)
#
# Set both to false to archive a tool: it stays in tools.yml as a record but
# disappears from all generated outputs.
#

- id: mcp-servers
  icon: "🤖"
  title: MCP Servers
  description: >-
    Connect AI assistants like Claude to your Lunch Money data using the Model Context Protocol. Chat with AI about your spending and budget habits.
    <a href="https://discord.com/channels/842337014556262411/1425305869813547030" target="_blank" class="no-dec">Join the AI Tools channel on Discord</a>.
  tools:
    - name: lunchmoney-mcp-server
      description: A Model Context Protocol server that connects Claude Desktop to your Lunch Money data. Now based on the v2 API.
      author: Levi Pols
      github: https://github.com/leafeye/lunchmoney-mcp-v2
      spotlight: /blog/2025-05-01-community-newsletter

    - name: lunchmoney-mcp
      description: A Model Context Protocol server that covers 100% of the Lunch Money API functionality with easy install and logging.
      author: akutishevsky
      github: https://github.com/akutishevsky/lunchmoney-mcp
      spotlight: /blog/2025-10-09-community-newsletter

    - name: lunchmoney-mcp-v2
      description: MCP server built on the official Lunch Money v2 SDK.
      author: Conner Burge
      github: https://github.com/ConnorDBurge/lunchmoney-mcp-v2

- id: sdks
  icon: "🧱"
  title: Client SDKs & API Wrappers
  description: >-
    Official and community-built libraries to interact with the Lunch Money API in your language of choice.
    Looking to generate your own? Install the <a href="https://www.npmjs.com/package/@lunch-money/v2-api-spec" target="_blank" class="no-dec">Lunch Money v2 OpenAPI Spec</a>.
  subsections:
    - title: V2 API
      tools:
        - name: Lunch Money JavaScript SDK
          description: Official JS SDK from the Lunch Money team with full TypeScript support.
          author: Lunch Money
          official: true
          lang: js
          github: https://github.com/lunch-money/lunch-money-js-v2
          links:
            - url: https://www.npmjs.com/package/@lunch-money/lunch-money-js-v2
              label: "NPM"

        - name: lunchmoney-clients
          description: A framework for generating language specific SDKs for the Lunch Money API. 
            Includes a generated Python SDK for the v2 API by Justin Flannery, author of the popular lunchable client.
          author: Justin Flannery
          lang: python
          github: https://github.com/juftin/lunchmoney-clients

    - title: V1 API
      note: >-
        <strong>A quick note:</strong> V1 is still fully supported, but we recommend the <a href="https://lunchmoney.dev" target="_blank" class="no-dec">V2 API</a> for new projects — it's where all new features and improvements are happening.
      marketing_site:
        include: false
      tools:
        - name: lunchmoney_dart
          description: A Lunch Money API wrapper written in Dart, perfect for building Flutter apps.
          author: Ventus
          lang: dart
          github: https://github.com/V3ntus/lunchmoney_dart

        - name: lunchmoney (Go)
          description: Golang API wrapper for the Lunch Money API.
          author: Nat Welch
          lang: go
          github: https://github.com/icco/lunchmoney

        - name: lunch-money-js
          description: JavaScript client for the Lunch Money API with TypeScript type definitions available via NPM.
          author: Lunch Money
          official: true
          lang: js
          github: https://github.com/lunch-money/lunch-money-js

        - name: lunchmoney (Kotlin)
          description: Non-blocking JVM client for the Lunch Money developer API, built for Java and Kotlin developers.
          author: Dmytro Marchuk
          lang: kotlin
          github: https://github.com/smaugfm/lunchmoney

        - name: lunchable
          description: Full-featured Python client for the Lunch Money Developer API.
          author: Justin Flannery
          lang: python
          github: https://github.com/juftin/lunchable
          spotlight: /blog/2025-02-28-community-newsletter

        - name: lunchmoney (Ruby)
          description: A Ruby gem API client library for the Lunch Money API.
          author: Michael Menanno
          lang: ruby
          github: https://github.com/mmenanno/lunchmoney

